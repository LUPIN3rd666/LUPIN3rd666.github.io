<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <title>DIY 定制 · 第二步外观设计 | Penta-Victory</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a class="brand" href="index.html">
        <div class="brand-mark">PV</div>
        <div>
          <div class="brand-title">Penta-Victory</div>
          <div class="brand-sub">中草药香囊 · 环保手作</div>
        </div>
      </a>

      <button class="nav-toggle" type="button" onclick="toggleMenu()">☰</button>

      <div class="nav-links" id="navLinks">
        <a href="index.html">首页</a>
        <a href="products.html">成品展示</a>
        <a href="diy.html" class="active">DIY 定制</a>
        <a href="core.html">可替换内芯</a>
      </div>
    </div>
  </nav>

  <main class="page-shell">
    <header class="page-header">
      <div class="page-header-inner">
        <div>
          <span class="kicker">DIY Step 02</span>
          <h1>选择你的外观风格</h1>
          <p>
            从星座或 MBTI 系列里挑选更贴近你的那一款，让香囊在视觉上也拥有更清晰的风格表达。
          </p>
        </div>
        <div class="page-header-image">
          <img src="images/xingzuo12.jpg" alt="外观设计主图"
               onerror="if(!this.dataset.fallback){this.dataset.fallback=1;this.src='images/xingzuo.jpg'}">
        </div>
      </div>
    </header>

    <section class="section">
      <div class="step-indicator">
        <div class="step"><span class="step-num">1</span> 草本选择</div>
        <div class="step active"><span class="step-num">2</span> 外观设计</div>
        <div class="step"><span class="step-num">3</span> 成品预览</div>
      </div>

      <span class="kicker reveal">Style Selection</span>
      <h2 class="section-title reveal">挑选最喜欢的那一种视觉风格</h2>
      <p class="section-subtitle reveal">
        这里展示的是外观设计图。选中之后，下一页会呈现对应的最终成品效果。
      </p>

      <div class="tab-switch reveal" style="margin-top:28px;">
        <button class="tab-btn active" type="button" data-tab="zodiac">✨ 十二星座</button>
        <button class="tab-btn" type="button" data-tab="mbti">🧠 MBTI</button>
      </div>

      <div class="theme-grid" id="zodiacGrid"></div>
      <div class="theme-grid hidden" id="mbtiGrid"></div>

      <div class="btn-row" style="margin-top:28px;">
        <a class="btn btn-secondary" href="diy.html">返回上一步</a>
        <button class="btn btn-primary" type="button" onclick="saveDesignAndNext()">下一步：成品预览</button>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <div>© Penta-Victory · 中央财经大学</div>
      <div>DIY 定制</div>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    const zodiacList = [
      { name: "白羊座", file: "baiyang", desc: "更热烈、更直接，也更有明亮感。" },
      { name: "金牛座", file: "jinniu", desc: "沉稳耐看，更偏温润与质感。" },
      { name: "双子座", file: "shuangzi", desc: "轻盈灵动，更有变化与新鲜感。" },
      { name: "巨蟹座", file: "juxie", desc: "柔和包裹，偏温暖陪伴。" },
      { name: "狮子座", file: "shizi", desc: "更有存在感，也更有舞台气场。" },
      { name: "处女座", file: "chunv", desc: "简洁细致，秩序感更强。" },
      { name: "天秤座", file: "tiancheng", desc: "轻盈优雅，整体更柔和。" },
      { name: "天蝎座", file: "tianxie", desc: "深邃神秘，情绪张力更鲜明。" },
      { name: "射手座", file: "sheshou", desc: "自由开阔，更偏活力表达。" },
      { name: "摩羯座", file: "mojie", desc: "克制稳重，更显高级感。" },
      { name: "水瓶座", file: "shuiping", desc: "清冷先锋，辨识度更强。" },
      { name: "双鱼座", file: "shuangyu", desc: "柔和梦幻，更偏氛围感。" }
    ];

    const mbtiList = [
      { name: "INTJ", file: "intj", desc: "理性锋利，整体更清晰克制。" },
      { name: "INTP", file: "intp", desc: "更偏思辨与探索气质。" },
      { name: "ENTJ", file: "entj", desc: "利落明确，更具结构感。" },
      { name: "ENTP", file: "entp", desc: "灵活跳跃，更有创意感。" },
      { name: "INFJ", file: "infj", desc: "细腻克制，带有理想气息。" },
      { name: "INFP", file: "infp", desc: "柔和诗意，情绪感更明显。" },
      { name: "ENFJ", file: "enfj", desc: "温暖明亮，更有亲和力。" },
      { name: "ENFP", file: "enfp", desc: "自由活泼，感染力更强。" },
      { name: "ISTJ", file: "istj", desc: "规整沉稳，秩序感更强。" },
      { name: "ISFJ", file: "isfj", desc: "柔和耐看，更显温柔。" },
      { name: "ESTJ", file: "estj", desc: "利落直接，轮廓更明确。" },
      { name: "ESFJ", file: "esfj", desc: "明朗友好，更有亲近感。" },
      { name: "ISTP", file: "istp", desc: "冷静克制，更简练。" },
      { name: "ISFP", file: "isfp", desc: "柔软自然，更有艺术感。" },
      { name: "ESTP", file: "estp", desc: "更直接、更有活力。" },
      { name: "ESFP", file: "esfp", desc: "明亮鲜活，更有吸引力。" }
    ];

    let selectedDesign = null;

    function createThemeCard(item, type, imagePath) {
      return `
        <article class="theme-card reveal" data-type="${type}" data-name="${item.name}">
          <div class="theme-image">
            <img src="${imagePath}" alt="${item.name}外观设计图">
          </div>
          <div class="theme-body">
            <h4>${type === 'zodiac' ? '✨ ' : '🧠 '}${item.name}</h4>
            <p>${item.desc}</p>
          </div>
        </article>
      `;
    }

    function renderDesigns() {
      document.getElementById('zodiacGrid').innerHTML = zodiacList.map(item => {
        return createThemeCard(item, 'zodiac', `images/${item.file}1.jpg`);
      }).join('');

      document.getElementById('mbtiGrid').innerHTML = mbtiList.map(item => {
        return createThemeCard(item, 'mbti', `images/${item.file}1.jpg`);
      }).join('');

      bindCardEvents();
      restoreSelection();
      initReveal();
    }

    function bindCardEvents() {
      document.querySelectorAll('.theme-card').forEach(card => {
        card.addEventListener('click', function () {
          document.querySelectorAll('.theme-card').forEach(item => item.classList.remove('selected'));
          this.classList.add('selected');

          const type = this.getAttribute('data-type');
          const name = this.getAttribute('data-name');

          if (type === 'zodiac') {
            const found = zodiacList.find(item => item.name === name);
            selectedDesign = {
              type: 'zodiac',
              name: found.name,
              file: found.file,
              designImage: `images/${found.file}1.jpg`,
              finalImage: `images/${found.file}.jpg`
            };
          } else {
            const found = mbtiList.find(item => item.name === name);
            selectedDesign = {
              type: 'mbti',
              name: found.name,
              file: found.file,
              designImage: `images/${found.file}1.jpg`,
              finalImage: `images/${found.file}.png`
            };
          }
        });
      });
    }

    function restoreSelection() {
      const saved = JSON.parse(localStorage.getItem('diy_design') || 'null');
      if (!saved) return;
      selectedDesign = saved;

      const target = document.querySelector(`.theme-card[data-type="${saved.type}"][data-name="${saved.name}"]`);
      if (target) target.classList.add('selected');
    }

    function initTabs() {
      const btns = document.querySelectorAll('.tab-btn');
      const zodiacGrid = document.getElementById('zodiacGrid');
      const mbtiGrid = document.getElementById('mbtiGrid');

      btns.forEach(btn => {
        btn.addEventListener('click', function () {
          btns.forEach(item => item.classList.remove('active'));
          this.classList.add('active');

          const tab = this.getAttribute('data-tab');
          if (tab === 'zodiac') {
            zodiacGrid.classList.remove('hidden');
            mbtiGrid.classList.add('hidden');
          } else {
            zodiacGrid.classList.add('hidden');
            mbtiGrid.classList.remove('hidden');
          }
        });
      });
    }

    function saveDesignAndNext() {
      if (!selectedDesign) {
        alert('请先选择一款外观设计。');
        return;
      }

      localStorage.setItem('diy_design', JSON.stringify(selectedDesign));
      window.location.href = 'final.html';
    }

    window.addEventListener('DOMContentLoaded', function () {
      renderDesigns();
      initTabs();
    });
  </script>
</body>
</html>
